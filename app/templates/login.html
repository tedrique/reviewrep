{% extends "base.html" %}
{% block title %}Login — ReviewReply AI{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16 px-4">
    <div class="bg-white p-8 rounded-2xl border border-gray-200 shadow-sm">
        <h1 class="text-2xl font-bold text-center mb-2">Get started</h1>
        <p class="text-gray-500 text-center text-sm mb-8">Connect your Google Business to start replying to reviews with AI.</p>

        <!-- Google OAuth -->
        <a href="/auth/google" class="flex items-center justify-center gap-3 w-full border border-gray-300 rounded-lg px-4 py-3 hover:bg-gray-50 transition font-medium">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Continue with Google
        </a>

        <div class="flex items-center gap-3 my-6">
            <div class="flex-1 h-px bg-gray-200"></div>
            <span class="text-xs text-gray-400">or try without Google</span>
            <div class="flex-1 h-px bg-gray-200"></div>
        </div>

        <!-- Demo login -->
        <form method="POST" action="/demo-login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your name</label>
                <input type="text" name="name" required placeholder="John Smith"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" required placeholder="john@mybusiness.co.uk"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-gray-900 text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition">
                Start with Email
            </button>
        </form>

        <p class="text-xs text-gray-400 text-center mt-6">
            By signing up you agree to our <a href="/terms" class="underline">Terms</a> and <a href="/privacy" class="underline">Privacy Policy</a>.
        </p>
    </div>
</div>
{% endblock %}
