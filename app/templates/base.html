<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ReviewReply AI{% endblock %}</title>
    <meta name="description" content="AI-powered Google review responses for UK small businesses. Reply to every review in 10 seconds.">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star { color: #fbbf24; }
        .star-empty { color: #d1d5db; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white/90 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-lg font-bold text-gray-900">ReviewReply <span class="text-blue-600">AI</span></a>

            <!-- Desktop nav -->
            <div class="hidden md:flex items-center gap-4 text-sm">
                {% if user %}
                    <a href="/dashboard" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                    <a href="/settings" class="text-gray-600 hover:text-gray-900">Settings</a>
                    <a href="/team" class="text-gray-600 hover:text-gray-900">Team</a>
                    <a href="/help" class="text-gray-600 hover:text-gray-900">Help</a>
                    <a href="/profile" class="text-gray-600 hover:text-gray-900">{{ user.name or user.email }}</a>
                    <a href="/logout" class="text-red-500 hover:text-red-700">Logout</a>
                {% else %}
                    <a href="/#pricing" class="text-gray-600 hover:text-gray-900">Pricing</a>
                    <a href="/login" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Get Started</a>
                {% endif %}
            </div>

            <!-- Mobile hamburger -->
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-1">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <!-- Mobile menu -->
        <div id="mobile-menu" class="hidden md:hidden border-t border-gray-100 bg-white px-4 py-3 space-y-2">
            {% if user %}
                <a href="/dashboard" class="block text-gray-700 py-2">Dashboard</a>
                <a href="/settings" class="block text-gray-700 py-2">Settings</a>
                <a href="/team" class="block text-gray-700 py-2">Team</a>
                <a href="/help" class="block text-gray-700 py-2">Help</a>
                <a href="/profile" class="block text-gray-700 py-2">Profile</a>
                <a href="/logout" class="block text-red-500 py-2">Logout</a>
            {% else %}
                <a href="/#pricing" class="block text-gray-700 py-2">Pricing</a>
                <a href="/login" class="block bg-blue-600 text-white text-center py-2.5 rounded-lg font-semibold">Get Started</a>
            {% endif %}
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
